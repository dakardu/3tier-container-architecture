x-app-common: &app-common
  networks:
    - app_network
  env_file:
    - .env
  depends_on:
    - mysql
    - redis
services:
  mysql:
    image: mariadb:10.5
    container_name: mysql
    networks:
      - app_network
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_web
    volumes:
      - db_data:/var/lib/mysql # PERSISTENCIA DE DATOS
      - ./db:/docker-entrypoint-initdb.d # Scripts de inicialización (.sql)
  app0:
    <<: *app-common
    build: ./app
    container_name: app0
    environment:
      DB_HOST: mysql
      DB_NAME: app_web
      REDIS_HOST: redis
      REDIS_PORT: 6379
  app1:
    <<: *app-common
    build: ./app
    container_name: app1
    environment:
      DB_HOST: mysql
      DB_NAME: app_web
      REDIS_HOST: redis
      REDIS_PORT: 6379
  app2:
    <<: *app-common
    build: ./app
    container_name: app2
    environment:
      DB_HOST: mysql
      DB_NAME: app_web
      REDIS_HOST: redis
      REDIS_PORT: 6379
  nginx:
    image: nginx:latest
    container_name: nginx
    networks:
      - app_network
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app0
      - app1
      - app2
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - app_network
    restart: always
    volumes:
      - redis_data:/data # PERSISTENCIA DE DATOS
volumes:
  db_data:
  redis_data:
networks:
  app_network:
    driver: bridge
